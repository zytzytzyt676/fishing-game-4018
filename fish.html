<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🎣终极钓鱼大亨</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial}
        body{background:#0b1220;color:#e6e9ef;padding:12px;min-height:100vh}
        .box{background:#121a29;border-radius:12px;padding:14px;margin-bottom:10px}
        .title{color:#9ceeff;text-align:center;margin-bottom:10px;font-size:18px}
        .btn{display:block;width:100%;background:#1b263b;color:#fff;border:none;border-radius:10px;padding:14px;margin:6px 0;font-size:16px}
        .btn-primary{background:#0099cc}
        .btn-success{background:#22aa66}
        .btn-warning{background:#cc8800}
        .btn-danger{background:#cc2244}
        .info{display:flex;justify-content:space-between;color:#aabbcc;margin-bottom:8px}
        .log{color:#c0c8d7;font-size:14px;margin-top:8px;line-height:1.4}
        .task{padding:8px 0;border-bottom:1px solid #1e2a3a}
        .task .done{color:#6f3}
        .task .doing{color:#99ccff}
        .rarity{font-weight:bold}
        .white{color:#fff}
        .blue{color:#66f}
        .green{color:#0f9}
        .cyan{color:#0ff}
        .purple{color:#f3f}
        .yellow{color:#fc3}
        .red{color:#f44}
        .gold{color:#ffc832}
        .aqua{color:#0ff}
    </style>
</head>
<body>
    <div class="box">
        <h2 class="title">🎣 终极钓鱼大亨 · 曲波宇宙</h2>
        <div class="info">
            <span>称号：<span id="title">新手</span></span>
            <span>鱼竿：<span id="rod">木竿</span></span>
        </div>
        <div class="info">
            <span>金币：<span id="coin">0</span></span>
            <span>经验：<span id="exp">0</span></span>
        </div>
    </div>

    <div id="menu">
        <button class="btn btn-primary" onclick="goFish()">🎣 开始钓鱼</button>
        <button class="btn btn-success" onclick="showCollection()">📖 钓鱼图鉴</button>
        <button class="btn btn-warning" onclick="showTasks()">📋 任务大厅</button>
        <button class="btn" onclick="showShop()">🛒 渔具商店</button>
        <button class="btn btn-danger" onclick="saveGame()">💾 保存游戏</button>
    </div>

    <div class="box">
        <h3 class="title">🐟 渔获日志</h3>
        <div id="log" class="log"></div>
    </div>

    <script>
        const SAVE_KEY = "fish_game_save";
        const BASE = ["曲波","蝈蝈","张德华","猪纯悦","三金","王博","王梓博"];
        const PRE = ["魔","神","天","圣","暗","光","龙","冰","炎","雷","巨","幻","金","黑","白"];
        const SUF = ["鱼","灵","妖","将","王","皇","尊","魂","影","焰","刺","翼","角","牙"];

        const RARITY = [
            {name:"普通",color:"white",weight:60},
            {name:"稀有",color:"blue",weight:25},
            {name:"精致",color:"green",weight:10},
            {name:"卓越",color:"cyan",weight:5},
            {name:"史诗",color:"purple",weight:2},
            {name:"传说",color:"yellow",weight:1},
            {name:"神话",color:"red",weight:0.5},
            {name:"永恒",color:"purple",weight:0.2},
            {name:"混沌",color:"gold",weight:0.08},
            {name:"创世神",color:"aqua",weight:0.02}
        ];

        const RODS = [
            {name:"木竿",lv:1,rate:5,price:0},
            {name:"铁竿",lv:2,rate:12,price:1000},
            {name:"白金竿",lv:3,rate:22,price:10000},
            {name:"星耀竿",lv:4,rate:35,price:50000},
            {name:"神谕竿",lv:5,rate:50,price:200000},
            {name:"混沌竿",lv:6,rate:68,price:1000000},
            {name:"创世竿",lv:7,rate:90,price:5000000}
        ];

        let FISH = [];
        let TASKS = [];

        function genFish(){
            let pool = [];
            for(let i=0;i<888;i++){
                let name = PRE[Math.random()*PRE.length|0] + BASE[Math.random()*BASE.length|0] + SUF[Math.random()*SUF.length|0];
                let r = weightedRandom(RARITY);
                let coin = Math.randInt(10,999999);
                let exp = Math.randInt(3,20000);
                pool.push({name,rarity:r.name,color:r.color,coin,exp});
            }
            return pool;
        }

        function genTasks(){
            let pool = [];
            for(let i=0;i<777;i++){
                let r = RARITY[Math.randInt(0,RARITY.length)];
                let need = Math.randInt(1,30);
                pool.push({
                    name:`钓${need}条「${r.name}」鱼`,
                    rarity:r.name,
                    need,
                    reward_coin:Math.randInt(100,500000),
                    reward_exp:Math.randInt(10,10000)
                });
            }
            return pool;
        }

        Math.randInt = (a,b)=>Math.floor(Math.random()*(b-a))+a;
        function weightedRandom(list){
            let total = list.reduce((s,x)=>s+x.weight,0);
            let r = Math.random()*total;
            let sum=0;
            for(let x of list){sum+=x.weight;if(r<=sum)return x;}
            return list[0];
        }

        let game = {
            coin:3000, exp:0, rod:0,
            collection:{}, stats:{}, total:0,
            tasks:[], progress:{}
        };

        function newGame(){
            FISH = genFish();
            TASKS = genTasks();
            game = {
                coin:3000, exp:0, rod:0, collection:{},
                stats:Object.fromEntries(RARITY.map(r=>[r.name,0])),
                total:0, tasks:[], progress:{}
            };
            refreshTasks();
            saveGame();
        }

        function refreshTasks(){
            game.tasks = [];
            for(let i=0;i<12;i++){
                let t = TASKS[Math.randInt(0,TASKS.length)];
                game.tasks.push(t);
                game.progress[t.name] = 0;
            }
        }

        function loadGame(){
            let data = localStorage.getItem(SAVE_KEY);
            if(data){try{game=JSON.parse(data);}catch(e){newGame();}}
            else newGame();
            if(!FISH.length)FISH=genFish();
            if(!TASKS.length)TASKS=genTasks();
            updateUI();
        }

        function saveGame(){
            localStorage.setItem(SAVE_KEY,JSON.stringify(game));
            log("💾 游戏已保存！");
        }

        function updateUI(){
            document.getElementById("coin").textContent = game.coin;
            document.getElementById("exp").textContent = game.exp;
            document.getElementById("rod").textContent = RODS[game.rod].name;
            document.getElementById("title").textContent = getTitle();
        }

        function getTitle(){
            let e=game.exp;
            if(e>=50000)return "创世钓神";
            if(e>=20000)return "混沌钓尊";
            if(e>=10000)return "神话钓皇";
            if(e>=5000)return "传说钓王";
            if(e>=2000)return "史诗钓将";
            if(e>=800)return "卓越钓师";
            if(e>=300)return "精致钓手";
            return "钓鱼新手";
        }

        function log(msg){
            let el = document.getElementById("log");
            el.innerHTML = msg + "<br>" + el.innerHTML;
        }

        function goFish(){
            let rod = RODS[game.rod];
            let r = weightedRandom(RARITY);
            let pool = FISH.filter(f=>f.rarity===r.name);
            let fish = pool[Math.randInt(0,pool.length)];
            game.coin += fish.coin;
            game.exp += fish.exp;
            game.total++;
            game.stats[r.name]++;
            if(!game.collection[fish.name])game.collection[fish.name]=1;
            else game.collection[fish.name]++;

            for(let t of game.tasks){
                if(t.rarity===r.name)game.progress[t.name]++;
            }

            log(`🐟 钓到：<span class="${fish.color}">${fish.name}</span>｜${r.name}｜💰+${fish.coin}｜✨+${fish.exp}`);
            saveGame();
            updateUI();
        }

        function showCollection(){
            let txt = `📖 图鉴（已收集：${Object.keys(game.collection).length}/${FISH.length}）\n`;
            for(let r of RARITY){
                txt += `${r.name}：${game.stats[r.name]||0}条\n`;
            }
            alert(txt);
        }

        function showTasks(){
            let txt = "📋 任务（完成即刷新）\n";
            for(let i=0;i<game.tasks.length;i++){
                let t=game.tasks[i];
                let p=game.progress[t.name]||0;
                let ok=p>=t.need?"✅":"⏳";
                txt+=`${i+1} ${t.name} ${p}/${t.need} ${ok}\n`;
            }
            alert(txt);
            let idx = prompt("输入要领取的任务序号：");
            if(!idx)return;
            idx = parseInt(idx)-1;
            let t = game.tasks[idx];
            if(!t)return;
            let p = game.progress[t.name]||0;
            if(p>=t.need){
                game.coin += t.reward_coin;
                game.exp += t.reward_exp;
                game.tasks[idx] = TASKS[Math.randInt(0,TASKS.length)];
                game.progress[game.tasks[idx].name] = 0;
                log("✅ 任务完成！已刷新新任务！");
                saveGame();
                updateUI();
            }else{
                alert("未完成！");
            }
        }

        function showShop(){
            let txt = "🛒 渔具商店\n";
            for(let i=0;i<RODS.length;i++){
                let r=RODS[i];
                txt+=`${i+1} ${r.name} Lv${r.lv} 价格：${r.price}\n`;
            }
            alert(txt);
            let idx = prompt("输入要购买的鱼竿序号：")-1;
            if(!idx)return;
            let r=RODS[idx];
            if(!r)return;
            if(game.coin>=r.price && r.lv>RODS[game.rod].lv){
                game.coin -= r.price;
                game.rod = idx;
                log(`✅ 购买成功：${r.name}`);
                saveGame();
                updateUI();
            }else{
                alert("金币不足或已拥有更高级");
            }
        }

        loadGame();
    </script>
</body>
</html>
